{% extends "base.html" %}

{% block title %}管理员登录 | Socks5 Panel{% endblock %}

{% block content %}
  <section class="login-shell">
    <form method="post" class="login-form card surface">
      <div class="login-header">
        <span class="brand-mark">S5</span>
        <div>
          <span class="eyebrow">Admin Access</span>
          <h1>登录控制台</h1>
        </div>
      </div>

      <label class="field">
        <span>管理员账号 <em>*</em></span>
        <input type="text" name="username" autocomplete="username" placeholder="admin" required>
      </label>

      <label class="field">
        <span>管理员密码 <em>*</em></span>
        <input type="password" name="password" autocomplete="current-password" placeholder="请输入密码" required>
      </label>

      <button type="submit" class="primary-button">登录</button>
      <p class="helper-text">首次部署后，请尽快在 `.env` 中修改默认管理员密码。</p>
    </form>
  </section>
{% endblock %}
